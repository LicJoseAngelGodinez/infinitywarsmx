name: war-results

on:
  schedule:
    - cron: '5 9 * * 1'  # Lunes a las 9:05 UTC (después de members-daily a las 9:00)
  workflow_dispatch:       # Disparo manual para pruebas

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Capture war results
        env:
          CLASH_API_KEY:       ${{ secrets.CLASH_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node .github/scripts/war-results.js
