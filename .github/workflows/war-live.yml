name: war-live

on:
  # Migrado a Supabase Cron (supabase/cron.sql) — ver war-live Edge Function.
  # schedule:
  #   - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:                               # Disparo manual de respaldo

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update war live snapshot
        env:
          CLASH_API_KEY:       ${{ secrets.CLASH_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node .github/scripts/war-live.js
