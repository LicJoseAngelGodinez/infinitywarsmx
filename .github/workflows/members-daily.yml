name: members-daily

on:
  schedule:
    - cron: '0 9 * * *'   # Diario a las 9:00 UTC (antes del corte de 9:45)
  workflow_dispatch:        # Disparo manual para pruebas

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Capture member snapshots
        env:
          CLASH_API_KEY:       ${{ secrets.CLASH_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node .github/scripts/members-daily.js
